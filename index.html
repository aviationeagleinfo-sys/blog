<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviation Eagle | Blog</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/0/08/Aviation_Eagle_Logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://media.aviationeagle.co.uk/logo.png">
    <style>
        :root {
            --white: #ffffff;
            --text-main: #111111;
            --text-muted: #888888;
            --radar-border: rgba(0, 0, 0, 0.08);
            --radar-glow: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--white);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* --- RADAR SPLASH SCREEN MULTI-TARGET --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }

        .splash-logo {
            width: 130px;
            margin-bottom: 60px;
            filter: grayscale(1);
        }

        .radar-screen {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 1px solid var(--radar-border);
            background: radial-gradient(circle, #fff 0%, #fcfcfc 100%);
        }

        /* Linea di scansione migliorata */
        .radar-line {
            position: absolute;
            top: 50%; left: 50%;
            width: 50%; height: 2px;
            background: linear-gradient(to right, var(--radar-glow), transparent);
            transform-origin: left center;
            animation: radar-scan 2s infinite linear;
            z-index: 2;
        }

        /* Formazione Aerei (Multi-target) */
        .plane {
            position: absolute;
            font-size: 14px;
            opacity: 0;
            color: var(--text-main);
        }

        /* Posizioni diverse nel radar */
        .p1 { top: 20%; left: 60%; transform: rotate(-40deg); animation: blink 2s infinite 0.4s; }
        .p2 { top: 40%; left: 75%; transform: rotate(-30deg); animation: blink 2s infinite 0.6s; }
        .p3 { top: 65%; left: 55%; transform: rotate(-50deg); animation: blink 2s infinite 0.9s; }

        @keyframes radar-scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes blink {
            0% { opacity: 0; }
            10% { opacity: 0.8; filter: drop-shadow(0 0 2px rgba(0,0,0,0.3)); }
            30% { opacity: 0; }
            100% { opacity: 0; }
        }

        .hidden { display: none !important; }

        /* --- BLOG LAYOUT --- */
        header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            position: sticky; top: 0; z-index: 99;
        }

        .logo-nav { height: 40px; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .blog-header { margin-bottom: 4rem; text-align: left; }
        .blog-header h1 { font-size: 2rem; letter-spacing: 1px; font-weight: 600; }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        .post-card { text-decoration: none; color: inherit; }
        .post-card .img-box {
            width: 100%; aspect-ratio: 16/9;
            background: #eee; margin-bottom: 15px;
            overflow: hidden;
        }

        .post-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.4s;
        }

        .post-card:hover img { transform: scale(1.05); }

        .post-card h3 { font-size: 1.3rem; margin-bottom: 8px; font-weight: 500; }
        .post-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

    </style>
</head>
<body>

    <!-- SPLASH SCREEN CON RADAR MULTI-AEREO -->
    <div id="splash-screen">
        <img src="https://media.aviationeagle.co.uk/logo.png" alt="Aviation Eagle" class="splash-logo">
        <div class="radar-screen">
            <div class="radar-line"></div>
            <!-- Formazione velivoli -->
            <div class="plane p1">✈</div>
            <div class="plane p2">✈</div>
            <div class="plane p3">✈</div>
        </div>
    </div>

    <header>
        <img src="https://media.aviationeagle.co.uk/logo.png" alt="Aviation Eagle" class="logo-nav">
    </header>

    <main class="container">
        <div class="blog-header">
            <h1>Intelligence & Blog</h1>
        </div>

        <div class="blog-grid">
            <!-- POST 1 -->
            <a href="#" class="post-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1517976487492-5750f3195933?auto=format&fit=crop&w=800" alt="News">
                </div>
                <h3>Aggiornamento Flotta: Eagle One</h3>
                <p>Revisione completa dei sistemi avionici e ottimizzazione dei consumi per il primo trimestre 2026.</p>
            </a>
            
            <!-- Aggiungi qui altri post -->
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            const splashShown = sessionStorage.getItem('ae_multi_radar');

            if (isMobile && !splashShown) {
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.classList.add('hidden');
                        sessionStorage.setItem('ae_multi_radar', 'true');
                    }, 800);
                }, 3500); 
            } else {
                splash.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
